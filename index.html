<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Пациент — регистр</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--text:#1e293b;--muted:#64748b;--line:#e2e8f0;--accent:#0f766e;--accent2:#0ea5e9;--danger:#b91c1c;--radius:18px}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1280px;margin:0 auto;padding:20px}.hidden{display:none!important}
    .auth{min-height:100vh;display:grid;place-items:center;padding:20px}.auth-card,.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 10px 30px rgba(15,23,42,.06)}
    .auth-card{width:min(420px,100%);padding:28px}.auth h1{margin:0 0 8px;font-size:28px}.muted{color:var(--muted)}
    .field{display:grid;gap:8px;margin-top:16px}.input,.select{width:100%;padding:12px 14px;border:1px solid #cbd5e1;border-radius:12px;background:#fff;font:inherit}
    .btn{margin-top:16px;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:12px 16px;font-weight:700;cursor:pointer}.btn:hover{filter:brightness(.96)}
    .error{color:var(--danger);min-height:22px;margin-top:10px}.top{display:grid;grid-template-columns:1.2fr .9fr .9fr;gap:14px;margin-bottom:16px}
    .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:16px}.stack{display:grid;gap:16px}.card{padding:18px}.title{margin:0 0 12px;font-size:18px}
    .chips{display:flex;flex-wrap:wrap;gap:8px}.chip{padding:8px 12px;border-radius:999px;background:#ecfeff;color:#155e75;font-size:13px;border:1px solid #bae6fd}
    ul.clean{margin:0;padding-left:18px;display:grid;gap:8px}.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;font-size:14px}
    .table th,.table td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}.table th{position:sticky;top:0;background:#f8fafc}
    .kv{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.kv div{padding:12px;border:1px solid var(--line);border-radius:14px;background:#fafafa}
    .kv b{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}.canvas-box{height:420px} .footer-note{font-size:12px;color:var(--muted);margin-top:10px}
    @media (max-width: 960px){.top,.grid,.kv{grid-template-columns:1fr}.canvas-box{height:320px}}
  </style>
</head>
<body>
  <section id="auth" class="auth">
    <div class="auth-card">
      <h1>Защищённый доступ</h1>
      <p class="muted">Введите пароль для просмотра регистра пациента.</p>
      <div class="field"><label for="password">Пароль</label><input id="password" class="input" type="password" placeholder="Введите пароль" /></div>
      <button id="loginBtn" class="btn">Открыть</button>
      <div id="authError" class="error"></div>
    </div>
  </section>

  <main id="app" class="hidden">
    <div class="wrap">
      <div class="top">
        <input id="searchInput" class="input" placeholder="Поиск по таблице, диагнозам, терапии" />
        <select id="groupSelect" class="select"></select>
        <select id="metricSelect" class="select"></select>
      </div>

      <section class="grid">
        <div class="stack">
          <div class="card">
            <h2 class="title">Паспорт</h2>
            <div id="passportBox" class="kv"></div>
          </div>
          <div class="card">
            <h2 class="title">Диагнозы</h2>
            <ul id="diagnosesBox" class="clean"></ul>
          </div>
          <div class="card">
            <h2 class="title">Терапия</h2>
            <div id="therapyBox" class="table-wrap"></div>
          </div>
        </div>
        <div class="stack">
          <div class="card">
            <h2 class="title">Показатель</h2>
            <div class="canvas-box"><canvas id="metricChart"></canvas></div>
            <div class="footer-note">Сверху выбирается один показатель, на графике отображается только он.</div>
          </div>
          <div class="card">
            <h2 class="title">Группы показателей</h2>
            <div id="groupChips" class="chips"></div>
          </div>
          <div class="card">
            <h2 class="title">Ключевые показатели 2026</h2>
            <div id="keyBox" class="table-wrap"></div>
          </div>
        </div>
      </section>

      <section class="card" style="margin-top:16px">
        <h2 class="title">Лабораторные данные</h2>
        <div id="labsBox" class="table-wrap"></div>
      </section>
    </div>
  </main>

  <script>
    const PASSWORD = 'med2026';
    const graphGroups = {
      'Липиды': ['totalcholesterol','ldl','hdl','triglycerides'],
      'Углеводный обмен': ['hba1c','glucose','hscrp'],
      'Гормоны': ['testosterone','fsh','lh','vitamind'],
      'Антропометрия': ['weight'],
      'Давление и пульс': ['sbp','dbp','pulse']
    };
    const metricLabels = {
      totalcholesterol:'Общий холестерин', ldl:'ЛПНП', hdl:'ЛПВП', triglycerides:'Триглицериды',
      hba1c:'HbA1c', glucose:'Глюкоза', hscrp:'hs-CRP', testosterone:'Тестостерон',
      fsh:'ФСГ', lh:'ЛГ', vitamind:'Витамин D', weight:'Вес', sbp:'САД', dbp:'ДАД', pulse:'Пульс'
    };
    const auth = document.getElementById('auth');
    const app = document.getElementById('app');
    const authError = document.getElementById('authError');
    document.getElementById('loginBtn').addEventListener('click', tryLogin);
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

    function tryLogin(){
      const val = document.getElementById('password').value;
      if(val !== PASSWORD){ authError.textContent = 'Неверный пароль'; return; }
      auth.classList.add('hidden');
      app.classList.remove('hidden');
      boot();
    }

    let rawData, chart;
    async function boot(){
      const res = await fetch('./assets/patient-data.json?ts=' + Date.now());
      rawData = await res.json();
      renderPassport(); renderDiagnoses(); renderTherapy(); renderKey(); setupFilters(); renderLabs();
    }

    function renderPassport(){
      const box = document.getElementById('passportBox');
      const map = rawData.passport || {};
      const rows = Object.keys(map).length ? Object.entries(map) : (rawData.passport_raw || []).map((v,i)=>['Поле ' + (i+1), v]);
      box.innerHTML = rows.map(([k,v]) => `<div><b>${escapeHtml(k)}</b>${escapeHtml(v ?? '')}</div>`).join('');
    }

    function renderDiagnoses(){
      document.getElementById('diagnosesBox').innerHTML = (rawData.diagnoses || []).map(x => `<li>${escapeHtml(x)}</li>`).join('');
    }

    function renderTherapy(){
      const rows = rawData.therapy || [];
      document.getElementById('therapyBox').innerHTML = tableHtml(rows, ['date','intervention','dose','schedule','comment']);
    }

    function renderKey(){
      const rows = rawData.key_markers || [];
      document.getElementById('keyBox').innerHTML = tableHtml(rows, ['marker','result','unit','comment']);
      const chips = document.getElementById('groupChips');
      chips.innerHTML = Object.keys(graphGroups).map(g => `<span class="chip">${escapeHtml(g)}</span>`).join('');
    }

    function setupFilters(){
      const groupSelect = document.getElementById('groupSelect');
      const metricSelect = document.getElementById('metricSelect');
      groupSelect.innerHTML = Object.keys(graphGroups).map(g => `<option>${escapeHtml(g)}</option>`).join('');
      groupSelect.addEventListener('change', () => {
        fillMetrics(groupSelect.value);
        renderChart(metricSelect.value);
      });
      metricSelect.addEventListener('change', () => renderChart(metricSelect.value));
      document.getElementById('searchInput').addEventListener('input', renderLabs);
      fillMetrics(groupSelect.value);
      renderChart(metricSelect.value);
    }

    function fillMetrics(group){
      const metricSelect = document.getElementById('metricSelect');
      const metrics = graphGroups[group] || [];
      metricSelect.innerHTML = metrics.map(m => `<option value="${m}">${escapeHtml(metricLabels[m] || m)}</option>`).join('');
    }

    function renderChart(metric){
      const rows = (rawData.graphs && rawData.graphs[metric] ? rawData.graphs[metric] : []).slice().sort((a,b)=>String(a.date).localeCompare(String(b.date)));
      const ctx = document.getElementById('metricChart');
      if(chart) chart.destroy();
      chart = new Chart(ctx, {
        type:'line',
        data:{labels:rows.map(r=>r.date), datasets:[{label:metricLabels[metric] || metric, data:rows.map(r=>r.value), borderColor:'#0f766e', backgroundColor:'rgba(15,118,110,.15)', tension:.25, fill:true, pointRadius:3}]},
        options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:true}}, scales:{y:{beginAtZero:false}, x:{ticks:{maxRotation:0}}}}
      });
    }

    function renderLabs(){
      const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
      let rows = rawData.labs || [];
      if(q){
        rows = rows.filter(r => Object.values(r).some(v => String(v ?? '').toLowerCase().includes(q)) || (rawData.diagnoses||[]).some(d => d.toLowerCase().includes(q)) || (rawData.therapy||[]).some(t => Object.values(t).some(v => String(v ?? '').toLowerCase().includes(q))));
      }
      document.getElementById('labsBox').innerHTML = tableHtml(rows, ['date','section','marker','result','unit','reference','assessment','trend','clinicalnote']);
    }

    function tableHtml(rows, cols){
      if(!rows.length) return '<div class="muted">Нет данных</div>';
      const head = `<thead><tr>${cols.map(c => `<th>${escapeHtml(c)}</th>`).join('')}</tr></thead>`;
      const body = `<tbody>${rows.map(r => `<tr>${cols.map(c => `<td>${escapeHtml(r[c] ?? '')}</td>`).join('')}</tr>`).join('')}</tbody>`;
      return `<table class="table">${head}${body}</table>`;
    }

    function escapeHtml(v){ return String(v).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
  </script>
</body>
</html>
