<section id="charts-section" style="margin-bottom: 32px;">
  <h2 style="margin: 0 0 16px 0;">Графики показателей</h2>
  <div id="charts-container" style="display:grid; gap:16px;"></div>
</section>

<script>
const markerLabelsRu = {
  ALT: "АЛТ",
  AST: "АСТ",
  Creatinine: "Креатинин",
  Urea: "Мочевина",
  Hemoglobin: "Гемоглобин",
  Platelets: "Тромбоциты",
  Leukocytes: "Лейкоциты",
  CRP: "С-реактивный белок",
  Glucose: "Глюкоза",
  Bilirubin: "Билирубин",
  Sodium: "Натрий",
  Potassium: "Калий",
  Chloride: "Хлор",
  Albumin: "Альбумин",
  TotalProtein: "Общий белок",
  Ferritin: "Ферритин",
  HbA1c: "Гликированный гемоглобин",
  LDL: "ЛПНП",
  HDL: "ЛПВП",
  Triglycerides: "Триглицериды",
  Cholesterol: "Общий холестерин",
  ESR: "СОЭ",
  WBC: "Лейкоциты",
  RBC: "Эритроциты",
  HGB: "Гемоглобин",
  PLT: "Тромбоциты"
};

function getMarkerLabel(name) {
  return markerLabelsRu[name] || name;
}

async function loadAndRenderCharts() {
  const response = await fetch('./assets/data.json');
  const data = await response.json();

  const chartsContainer = document.getElementById('charts-container');
  chartsContainer.innerHTML = '';

  const grouped = {};

  data.forEach(row => {
    const marker = row.marker || row.parameter || row.name || row.Показатель || row.Анализ;
    const date = row.date || row.Дата;
    const value = Number(row.value || row.Значение);

    if (!marker || !date || Number.isNaN(value)) return;

    if (!grouped[marker]) grouped[marker] = [];
    grouped[marker].push({ date, value });
  });

  Object.keys(grouped).forEach(marker => {
    grouped[marker].sort((a, b) => new Date(a.date) - new Date(b.date));

    const card = document.createElement('div');
    card.style.background = '#fff';
    card.style.border = '1px solid #ddd';
    card.style.borderRadius = '12px';
    card.style.padding = '16px';

    const canvas = document.createElement('canvas');
    canvas.height = 120;
    card.appendChild(canvas);
    chartsContainer.appendChild(card);

    new Chart(canvas.getContext('2d'), {
      type: 'line',
       {
        labels: grouped[marker].map(item => item.date),
        datasets: [{
          label: getMarkerLabel(marker),
           grouped[marker].map(item => item.value),
          borderColor: '#0b6bcb',
          backgroundColor: 'rgba(11,107,203,0.15)',
          tension: 0.3,
          fill: true,
          pointRadius: 3,
          pointHoverRadius: 5
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          title: {
            display: true,
            text: getMarkerLabel(marker),
            padding: {
              top: 8,
              bottom: 12
            },
            font: {
              size: 16,
              weight: 'bold'
            }
          },
          legend: {
            display: false
          }
        },
        scales: {
          x: {
            title: {
              display: true,
              text: 'Дата'
            }
          },
          y: {
            title: {
              display: true,
              text: 'Значение'
            }
          }
        }
      }
    });
  });
}

loadAndRenderCharts();
</script>
