<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Цифровой регистр пациента</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--accent:#0f766e;--danger:#b91c1c;--radius:18px}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text)}
    .hidden{display:none!important}.wrap{max-width:1280px;margin:0 auto;padding:20px}
    .auth{min-height:100vh;display:grid;place-items:center;padding:20px}
    .card,.auth-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--line);box-shadow:0 10px 30px rgba(15,23,42,.06)}
    .auth-card{width:min(420px,100%);padding:28px}
    h1,h2{margin:0 0 10px}h1{font-size:26px}h2{font-size:18px}.muted{color:var(--muted)}
    .field{display:grid;gap:6px;margin-top:14px}.input,.select{width:100%;padding:10px 12px;border-radius:12px;border:1px solid #cbd5e1;background:#fff;font:inherit}
    .btn{margin-top:16px;width:100%;padding:10px 14px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-weight:600;cursor:pointer}
    .btn:hover{filter:brightness(.96)}.error{margin-top:10px;min-height:20px;color:var(--danger);font-size:13px}
    .top{display:grid;grid-template-columns:1.15fr .95fr .95fr;gap:12px;margin-bottom:14px}
    .mobile-chart-card{display:none}
    .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:14px}.stack{display:grid;gap:14px}.card{padding:16px}
    .kv{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.kv div{border-radius:14px;border:1px solid var(--line);padding:10px;background:#f8fafc}
    .kv b{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
    ul.clean{margin:0;padding-left:18px;display:grid;gap:6px;font-size:14px}
    .table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;font-size:13px}
    .table th,.table td{padding:8px 6px;border-bottom:1px solid var(--line);white-space:nowrap;text-align:left}
    .table th{position:sticky;top:0;background:#f8fafc;font-weight:600}
    .canvas-box{height:380px}.footer-note{font-size:12px;color:var(--muted);margin-top:6px}
    @media(max-width:960px){
      .wrap{padding:12px}
      .top,.grid,.kv{grid-template-columns:1fr}
      .card{padding:14px;border-radius:14px}
      .top{gap:10px;margin-bottom:10px}
      .desktop-chart-card{display:none}
      .mobile-chart-card{display:block}
      .canvas-box{height:280px}
      .table{font-size:12px}
      .table th,.table td{padding:7px 6px}
    }
  </style>
</head>
<body>
<section id="auth" class="auth">
  <div class="auth-card">
    <h1>Закрытый регистр</h1>
    <p class="muted">Доступ только по паролю.</p>
    <div class="field">
      <label for="password">Пароль</label>
      <input id="password" class="input" type="password" placeholder="Введите пароль" />
    </div>
    <button id="loginBtn" class="btn">Открыть</button>
    <div id="authError" class="error"></div>
  </div>
</section>

<main id="app" class="hidden">
  <div class="wrap">
    <div class="top">
      <input id="searchInput" class="input" placeholder="Поиск по показателям, комментариям, диагнозам" />
      <select id="groupSelect" class="select"></select>
      <select id="markerSelect" class="select"></select>
    </div>

    <div class="card mobile-chart-card" style="margin-bottom:14px">
      <h2>График показателя</h2>
      <div class="canvas-box"><canvas id="markerChartMobile"></canvas></div>
      <div class="footer-note">На телефоне выбор показателя и сам график идут подряд.</div>
    </div>

    <section class="grid">
      <div class="stack">
        <div class="card">
          <h2>Паспорт</h2>
          <div id="passportBox" class="kv"></div>
        </div>
        <div class="card">
          <h2>Диагнозы</h2>
          <ul id="diagnosesBox" class="clean"></ul>
        </div>
        <div class="card">
          <h2>Терапия</h2>
          <div id="therapyBox" class="table-wrap"></div>
        </div>
      </div>
      <div class="stack">
        <div class="card desktop-chart-card">
          <h2>График показателя</h2>
          <div class="canvas-box"><canvas id="markerChart"></canvas></div>
          <div class="footer-note">Сверху выбираешь группу и показатель — здесь всегда один график.</div>
        </div>
        <div class="card">
          <h2>Исследования</h2>
          <div id="studiesBox" class="table-wrap"></div>
        </div>
      </div>
    </section>

    <section class="card" style="margin-top:14px">
      <h2>Все измерения</h2>
      <div id="rowsBox" class="table-wrap"></div>
    </section>
  </div>
</main>

<script>
  const PASSWORD = 'med2026';

  const authEl = document.getElementById('auth');
  const appEl = document.getElementById('app');
  const errEl = document.getElementById('authError');
  document.getElementById('loginBtn').onclick = tryLogin;
  document.getElementById('password').addEventListener('keydown', e=>{if(e.key==='Enter')tryLogin()});

  function tryLogin(){
    const v = document.getElementById('password').value;
    if(v !== PASSWORD){errEl.textContent='Неверный пароль';return;}
    errEl.textContent='';
    authEl.classList.add('hidden');
    appEl.classList.remove('hidden');
    boot();
  }

  let DATA = null;
  let chart = null;

  async function boot(){
    const res = await fetch('./assets/patient-data.json?ts='+Date.now());
    DATA = await res.json();
    renderPassport();
    renderDiagnoses();
    renderTherapy();
    renderStudies();
    setupFilters();
    renderRows();
  }

  function renderPassport(){
    const box = document.getElementById('passportBox');
    const map = DATA.passport || {};
    const rows = Object.keys(map).length
      ? Object.entries(map)
      : (DATA.passport_raw||[]).map((v,i)=>['Строка '+(i+1), v]);
    box.innerHTML = rows.map(([k,v])=>`<div><b>${esc(k)}</b>${esc(v||'')}</div>`).join('');
  }

  function renderDiagnoses(){
    const list = DATA.diagnoses || [];
    document.getElementById('diagnosesBox').innerHTML = list.map(x=>`<li>${esc(x)}</li>`).join('');
  }

  function renderTherapy(){
    const rows = DATA.therapy || [];
    document.getElementById('therapyBox').innerHTML = tableHtml(rows, ['date','intervention','dose','schedule','comment']);
  }

  function renderStudies(){
    const rows = DATA.studies || [];
    document.getElementById('studiesBox').innerHTML = tableHtml(rows, ['date','section','study','area','conclusion']);
  }

  function setupFilters(){
    const gSel = document.getElementById('groupSelect');
    const mSel = document.getElementById('markerSelect');
    const groups = DATA.groups || [];
    gSel.innerHTML = ['(все группы)'].concat(groups).map(g=>`<option value="${esc(g)}">${g==='(все группы)'?g:esc(g)}</option>`).join('');

    gSel.onchange = ()=>{
      fillMarkers();
      drawMarker();
    };
    mSel.onchange = drawMarker;
    document.getElementById('searchInput').oninput = renderRows;

    fillMarkers();
    drawMarker();
  }

  function fillMarkers(){
    const gSel = document.getElementById('groupSelect');
    const mSel = document.getElementById('markerSelect');
    const group = gSel.value;
    const rows = DATA.rows || [];
    const markers = [...new Set(rows
      .filter(r=>!group || group==='(все группы)' || (r.group||'')===group)
      .map(r=>r.marker)
      .filter(Boolean)
    )].sort();
    mSel.innerHTML = markers.map(m=>`<option value="${esc(m)}">${esc(m)}</option>`).join('');
  }

  function drawMarker(){
    const gSel = document.getElementById('groupSelect');
    const mSel = document.getElementById('markerSelect');
    const group = gSel.value;
    const marker = mSel.value;
    if(!marker){ return; }
    const all = DATA.series && DATA.series[marker] ? DATA.series[marker] : [];
    let rows = all.slice();
    if(group && group !== '(все группы)'){
      rows = rows.filter(r => (r.group||'') === group);
    }
    rows.sort((a,b)=>String(a.date).localeCompare(String(b.date)));

    const labels = rows.map(r=>r.date);
    const values = rows.map(r=>r.value);
    const unit = rows[0] && rows[0].unit ? ' ('+rows[0].unit+')' : '';

    const isMobile = window.matchMedia('(max-width: 960px)').matches;
    const canvasId = isMobile ? 'markerChartMobile' : 'markerChart';
    const ctx = document.getElementById(canvasId);
    if(chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets: [{
        label: marker + unit,
        data: values,
        borderColor: '#0f766e',
        backgroundColor: 'rgba(15,118,110,.15)',
        tension: .25, fill: true, pointRadius: 3
      }]},
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: true } },
        scales: {
          x: { ticks: { maxRotation: 0 } },
          y: { beginAtZero: false }
        }
      }
    });
  }

  function renderRows(){
    const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
    let rows = DATA.rows || [];
    if(q){
      rows = rows.filter(r => Object.values(r).some(v => String(v||'').toLowerCase().includes(q))
        || (DATA.diagnoses||[]).some(d => d.toLowerCase().includes(q))
        || (DATA.therapy||[]).some(t => Object.values(t).some(v => String(v||'').toLowerCase().includes(q))));
    }
    document.getElementById('rowsBox').innerHTML = tableHtml(rows, ['date','group','marker','value','unit','reference','comment']);
  }

  function tableHtml(rows, cols){
    if(!rows.length) return '<div class="muted">Нет данных</div>';
    const head = '<thead><tr>'+cols.map(c=>'<th>'+esc(c)+'</th>').join('')+'</tr></thead>';
    const body = '<tbody>'+rows.map(r=>'<tr>'+cols.map(c=>'<td>'+esc(r[c]??'')+'</td>').join('')+'</tr>').join('')+'</tbody>';
    return '<table class="table">'+head+body+'</table>';
  }

  function esc(v){
    return String(v).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
  }
</script>
</body>
</html>
