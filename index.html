<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>patient-dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
(function(){
  const PASSWORD = 'alex2026';
  const ok = prompt('Введите пароль');
  if (ok !== PASSWORD) {
    document.documentElement.innerHTML = '<head><meta charset="utf-8"><title>Доступ запрещён</title><style>body{font-family:Arial,sans-serif;background:#f7f6f2;color:#222;display:grid;place-items:center;min-height:100vh;margin:0}.box{background:#fff;border:1px solid #ddd;border-radius:14px;padding:24px;max-width:420px;text-align:center}h1{margin:0 0 8px;font-size:24px}p{margin:0;color:#666}</style></head><body><div class="box"><h1>Доступ запрещён</h1><p>Неверный пароль.</p></div></body>';
    throw new Error('Access denied');
  }
})();
</script>

  <style>
    :root { --bg:#f7f6f2; --card:#fff; --text:#222; --muted:#666; --line:#ddd; --accent:#0b6b6f; }
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1200px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:16px}
    h1,h2{margin:0 0 12px}.controls{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
    label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px} input,select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff}
    table{width:100%;border-collapse:collapse;font-size:14px} th,td{padding:10px;border-bottom:1px solid #eee;text-align:left;vertical-align:top} th{background:#fafafa}
    .grid{display:grid;grid-template-columns:1.2fr .8fr;gap:16px}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{padding:6px 10px;border-radius:999px;background:#eef6f6;color:var(--accent);font-size:13px}.muted{color:var(--muted)}
    @media (max-width:900px){.controls,.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card"><h1>Карта пациента</h1><div id="passportBlock" class="muted">Загрузка...</div></div>
    <div class="grid">
      <div class="card"><h2>Диагнозы</h2><div id="diagnosesBlock"></div></div>
      <div class="card"><h2>Ключевые разделы</h2><div id="studiesBlock"></div><div style="height:12px"></div><div id="therapyBlock"></div></div>
    </div>
    <div class="card">
      <h2>Фильтры</h2>
      <div class="controls">
        <div><label for="groupSelect">Группа</label><select id="groupSelect"></select></div>
        <div><label for="markerSelect">Показатель</label><select id="markerSelect"></select></div>
        <div><label for="searchInput">Поиск</label><input id="searchInput" type="text" placeholder="Например, холестерин" /></div>
        <div><label for="statusSelect">Статус</label><select id="statusSelect"><option value="all">Все</option><option value="high">Выше нормы</option><option value="low">Ниже нормы</option><option value="normal">В норме</option><option value="no_ref">Без границ</option></select></div>
      </div>
    </div>
    <div class="card"><h2>График</h2><canvas id="chart" height="110"></canvas></div>
    <div class="card">
      <h2>Таблица</h2>
      <div style="overflow:auto">
        <table>
          <thead><tr><th>Дата</th><th>Группа</th><th>Показатель</th><th>Значение</th><th>Единицы</th><th>Нижняя граница</th><th>Верхняя граница</th><th>Комментарий</th><th>Статус</th></tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
<script>
let allRows = [], info = {}, chart;
const parseNum = v => { if(v===null||v===undefined||v==='') return null; const n = Number(String(v).replace(/\s/g,'').replace(',','.')); return Number.isFinite(n) ? n : null; };
function getStatus(row){ const value=parseNum(row['Значение']); const low=parseNum(row['Нижняя граница']); const high=parseNum(row['Верхняя граница']); if(value===null) return 'Без значения'; if(low===null&&high===null) return 'Без границ'; if(low!==null&&value<low) return 'Ниже нормы'; if(high!==null&&value>high) return 'Выше нормы'; return 'В норме'; }
function statusCode(text){ if(text==='Выше нормы') return 'high'; if(text==='Ниже нормы') return 'low'; if(text==='В норме') return 'normal'; if(text==='Без границ') return 'no_ref'; return 'all'; }
function unique(arr){ return [...new Set(arr)].filter(Boolean).sort((a,b)=>String(a).localeCompare(String(b),'ru')); }
function fillInfo(){
  const passportRows = info.passport || [], diagnoses = info.diagnoses || [], studies = info.studies || [], therapy = info.therapy || [];
  document.getElementById('passportBlock').innerHTML = passportRows.length ? passportRows.map(r => `<div>${Object.entries(r).filter(([,v]) => String(v).trim() !== '').map(([k,v]) => `<strong>${k}:</strong> ${v}`).join(' · ')}</div>`).join('') : '<div class="muted">Нет данных</div>';
  document.getElementById('diagnosesBlock').innerHTML = diagnoses.length ? `<div class="chips">${diagnoses.map(r => `<span class="chip">${Object.values(r).filter(v => String(v).trim() !== '').join(' — ')}</span>`).join('')}</div>` : '<div class="muted">Нет диагнозов</div>';
  document.getElementById('studiesBlock').innerHTML = studies.length ? `<h3 style="margin:0 0 8px">Исследования</h3><div>${studies.map(r => `<div style="margin:0 0 8px">${Object.values(r).filter(v => String(v).trim() !== '').join(' — ')}</div>`).join('')}</div>` : '<div class="muted">Нет исследований</div>';
  document.getElementById('therapyBlock').innerHTML = therapy.length ? `<h3 style="margin:0 0 8px">Терапия</h3><div>${therapy.map(r => `<div style="margin:0 0 8px">${Object.values(r).filter(v => String(v).trim() !== '').join(' — ')}</div>`).join('')}</div>` : '<div class="muted">Нет данных по терапии</div>';
}
function fillFilters(){
  const groupSelect = document.getElementById('groupSelect'), markerSelect = document.getElementById('markerSelect');
  const selectedGroup = groupSelect.value || 'all';
  const groups = unique(allRows.map(r => r['Группа']));
  groupSelect.innerHTML = `<option value="all">Все группы</option>` + groups.map(g => `<option value="${g}">${g}</option>`).join('');
  groupSelect.value = groups.includes(selectedGroup) ? selectedGroup : 'all';
  const source = groupSelect.value === 'all' ? allRows : allRows.filter(r => r['Группа'] === groupSelect.value);
  const markers = unique(source.map(r => r['Показатель']));
  const currentMarker = markerSelect.value;
  markerSelect.innerHTML = `<option value="all">Все показатели</option>` + markers.map(m => `<option value="${m}">${m}</option>`).join('');
  markerSelect.value = markers.includes(currentMarker) ? currentMarker : (markers[0] || 'all');
}
function getFilteredRows(){
  const group = document.getElementById('groupSelect').value, marker = document.getElementById('markerSelect').value, search = document.getElementById('searchInput').value.trim().toLowerCase(), status = document.getElementById('statusSelect').value;
  return allRows.filter(r => {
    const s = getStatus(r), matchesGroup = group === 'all' || r['Группа'] === group, matchesMarker = marker === 'all' || r['Показатель'] === marker;
    const hay = [r['Показатель'], r['Группа'], r['Комментарий'], r['Дата']].join(' ').toLowerCase();
    const matchesSearch = !search || hay.includes(search), matchesStatus = status === 'all' || statusCode(s) === status;
    return matchesGroup && matchesMarker && matchesSearch && matchesStatus;
  }).sort((a,b)=> String(b['Дата']).localeCompare(String(a['Дата'])));
}
function renderTable(){
  const rows = getFilteredRows();
  document.getElementById('tableBody').innerHTML = rows.map(r => `<tr><td>${r['Дата'] || ''}</td><td>${r['Группа'] || ''}</td><td>${r['Показатель'] || ''}</td><td>${r['Значение'] ?? ''}</td><td>${r['Единицы'] || ''}</td><td>${r['Нижняя граница'] ?? ''}</td><td>${r['Верхняя граница'] ?? ''}</td><td>${r['Комментарий'] || ''}</td><td>${getStatus(r)}</td></tr>`).join('') || '<tr><td colspan="9">Нет данных</td></tr>';
}
function renderChart(){
  const marker = document.getElementById('markerSelect').value, group = document.getElementById('groupSelect').value;
  let rows = allRows.filter(r => group === 'all' || r['Группа'] === group);
  if(marker !== 'all') rows = rows.filter(r => r['Показатель'] === marker);
  else { const markers = unique(rows.map(r => r['Показатель'])); if(markers.length) rows = rows.filter(r => r['Показатель'] === markers[0]); }
  rows = rows.filter(r => parseNum(r['Значение']) !== null).sort((a,b)=> String(a['Дата']).localeCompare(String(b['Дата'])));
  const ctx = document.getElementById('chart');
  if(chart) chart.destroy();
  chart = new Chart(ctx, { type:'line', data:{ labels:rows.map(r => r['Дата']), datasets:[{ label:rows[0]?.['Показатель'] || 'Показатель', data:rows.map(r => parseNum(r['Значение'])), borderColor:'#0b6b6f', backgroundColor:'rgba(11,107,111,.12)', fill:true, tension:.25, pointRadius:4, pointHoverRadius:6 }] }, options:{ responsive:true, maintainAspectRatio:true, plugins:{ legend:{ display:true } }, scales:{ x:{ title:{ display:true, text:'Дата' } }, y:{ title:{ display:true, text:'Значение' } } } } });
}
function rerender(){ renderTable(); renderChart(); }
async function init(){
  const [dataRes, infoRes] = await Promise.all([fetch('./assets/data.json'), fetch('./assets/info.json')]);
  allRows = await dataRes.json(); info = await infoRes.json(); fillInfo(); fillFilters(); rerender();
  document.getElementById('groupSelect').addEventListener('change', () => { fillFilters(); rerender(); });
  document.getElementById('markerSelect').addEventListener('change', rerender);
  document.getElementById('searchInput').addEventListener('input', renderTable);
  document.getElementById('statusSelect').addEventListener('change', renderTable);
}
init();
</script>
</body>
</html>
