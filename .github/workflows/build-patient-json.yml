name: Build patient JSON

on:
  push:
    paths:
      - 'patient.xlsx'
      - 'scripts/build_patient_json.py'
      - '.github/workflows/build-patient-json.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install pandas openpyxl

      - name: Build JSON
        run: python scripts/build_patient_json.py

      - name: Commit generated assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Auto-build patient JSON'
          file_pattern: assets/patient-data.json
