name: Build patient JSON

on:
  push:
    paths:
      - 'patient_data.xlsx'
      - 'patient_info.xlsx'
      - '.github/workflows/build-patient-json.yml'
      - 'scripts/build_patient_json.py'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  build-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Build JSON files
        run: python scripts/build_patient_json.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data.json assets/info.json
          git diff --cached --quiet || git commit -m "Auto-build patient JSON from Excel"
          git push
